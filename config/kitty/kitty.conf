# kitty config — bound to SUPER+Return.
# Colours track Caelestia's scheme via current-theme.conf (regenerated by
# ~/.config/caelestia/scripts/kitty-theme.fish, watched by a systemd user path
# unit). Font/opacity mirror the foot setup so both terminals match.

font_family      JetBrains Mono Nerd Font
font_size        12.0

background_opacity 0.78
window_padding_width 14
cursor_shape       beam
cursor_beam_thickness 1.5
scrollback_lines   10000

enable_audio_bell  no
confirm_os_window_close 0

# Active colour scheme (generated from ~/.local/state/caelestia/scheme.json)
include current-theme.conf
