# ============================================================================
#  Personal variable overrides — sourced by Caelestia BEFORE the configs that
#  consume them. Set $variable values here (apps, gaps, blur, cursor, ...).
#  Everything is commented out; uncomment to take effect.
#  Keybinds / window rules go in hypr-user.conf instead.
# ============================================================================

# Cursor: the active config requests the "sweet-cursors" theme. After installing
# the AUR package, confirm the real theme directory name:
#     ls /usr/share/icons | grep -i sweet
# If it differs from "sweet-cursors" (e.g. "Sweet-cursors"), set it here so
# Hyprland's setcursor / XCURSOR_THEME match what's installed:
# $cursorTheme = Sweet-cursors

# Other examples (Caelestia defaults shown — uncomment to change):
# $browser = firefox
# $fileExplorer = thunar
# $windowGapsOut = 10
