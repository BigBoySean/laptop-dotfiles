# ============================================================================
#  Personal Hyprland overrides — sourced LAST by ~/.config/hypr/hypr/hyprland.conf
#  so anything here wins over upstream Caelestia defaults.
#  Collisions with Caelestia's keybinds.conf are unbind'd before rebinding.
#  Uses `bindd` (described binds) so they show up labeled in Caelestia's
#  keybind viewer.
# ============================================================================

# --- Unbind Caelestia defaults that collide with my binds -------------------
unbind = SUPER, E       # was: file explorer (thunar via app2unit)
unbind = SUPER, Q       # was: killactive (re-added below, labeled)
unbind = SUPER, P       # was: pin window
unbind = SUPER, L       # was: lock session  (reassigned to focus-right)
unbind = SUPER, K       # was: toggle all panels (showall)
unbind = SUPER, left    # was: movefocus l   (arrows reassigned to swapwindow)
unbind = SUPER, right   # was: movefocus r
unbind = SUPER, up      # was: movefocus u
unbind = SUPER, down    # was: movefocus d

# --- Apps & window actions --------------------------------------------------
bindd = SUPER, Return, Terminal (kitty),         exec, kitty
bindd = SUPER, B,      Browser (firefox),        exec, firefox
bindd = SUPER, E,      File manager (thunar),    exec, thunar
bindd = SUPER, Q,      Close active window,      killactive
bindd = SUPER, P,      Caelestia control center, global, caelestia:controlCenter
bindd = SUPER, A,      App launcher / drawer,    global, caelestia:launcher

# --- Edit configs -----------------------------------------------------------
# No collision with Caelestia: its only Backslash binds use Ctrl+Super /
# Ctrl+Super+Alt (distinct modmasks), so plain Super+Backslash is free.
bindd = SUPER, backslash, Edit personal Hyprland config, exec, codium ~/.config/caelestia/hypr-user.conf

# --- Screenshots (grim + slurp -> ~/Pictures/Screenshots + clipboard) -------
# Print (fullscreen) is left as Caelestia's default (caelestia screenshot).
# Region capture: primary is the modifier-only Ctrl+LeftShift you asked for;
# Ctrl+Shift+S is kept as a reliable fallback (modifier-only binds are flaky).
bindd = CTRL SHIFT, S, Region screenshot,                exec, ~/.config/caelestia/scripts/screenshot.fish region

# --- Window focus (vim-ish, I-on-top layout) --------------------------------
bindd = SUPER, L, Focus right, movefocus, r
bindd = SUPER, J, Focus left,  movefocus, l
bindd = SUPER, K, Focus down,  movefocus, d
bindd = SUPER, I, Focus up,    movefocus, u

# --- Window movement (swap window in direction; escape to adjacent workspace
#     at the horizontal layout edge — see scripts/move-or-send.fish) ----------
bindd = SUPER, right, Move window right (or to next workspace at edge), exec, fish ~/.config/caelestia/scripts/move-or-send.fish r
bindd = SUPER, left,  Move window left (or to prev workspace at edge),  exec, fish ~/.config/caelestia/scripts/move-or-send.fish l
bindd = SUPER, up,    Move window up,   exec, fish ~/.config/caelestia/scripts/move-or-send.fish u
bindd = SUPER, down,  Move window down, exec, fish ~/.config/caelestia/scripts/move-or-send.fish d

# --- Session ----------------------------------------------------------------
# Lock (same IPC as Caelestia's original Super+L: global, caelestia:lock).
# Super+Shift+L was Caelestia's suspend-then-hibernate bind — replaced here.
unbind = SUPER SHIFT, L   # was: exec systemctl suspend-then-hibernate
bindd = SUPER SHIFT, L, Lock session, global, caelestia:lock

# --- Network ----------------------------------------------------------------
# Caelestia's built-in WiFi widget is NetworkManager-only and can't read iwd,
# so it stays blank on this iwd-based system. Use impala (TUI front-end for
# iwd) in a floating terminal instead.  (GUI alternative: install iwgtk.)
bindd = SUPER SHIFT, W, WiFi menu (impala/iwd), exec, foot --app-id impala -e impala
windowrule = float true,  match:class impala
windowrule = size 50% 60%, match:class impala
windowrule = center 1,    match:class impala

# --- Workspaces -------------------------------------------------------------
# Switch to next/previous workspace (+1/-1: includes empty workspaces; +1
# creates the next one on demand, -1 clamps at workspace 1 — does not wrap).
# Super+Shift+Left/Right were Caelestia's movewindow l/r — replaced here.
unbind = SUPER SHIFT, right   # was: movewindow r
unbind = SUPER SHIFT, left    # was: movewindow l
bindd = SUPER SHIFT, right, Next workspace,     workspace, +1
bindd = SUPER SHIFT, left,  Previous workspace, workspace, -1
